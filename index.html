<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0
  "
>

<title>海上無線 試験アプリ</title>

<style>

body{
  font-family:sans-serif;
  padding:10px;

  background:
    linear-gradient(
      rgba(0,40,70,0.75),
      rgba(0,20,40,0.9)
    ),
    url("img/bg.jpg");

  background-size:cover;
  background-attachment:fixed;
  background-position:center;

  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  gap:10px;
}

button{
  width:100%;
  padding:12px;
  margin:5px 0;
  font-size:16px;

  border:none;
  border-radius:10px;

  background:#0b3d5c;
  color:white;

  border:1px solid #4fc3f7;

  touch-action:manipulation;
  transition:0.2s;
}

.choiceBtn{
  text-align:left;
  padding-left:15px;
}

.numberBtn{
  text-align:left;
  padding-left:15px;
}
button:hover{
  transform:scale(1.02);
  background:#12557f;
}

.choiceBtn{
  text-align:left;
  padding-left:15px;
}

.choiceBtn.selected{
  background:#00c853 ;
  color:white;
}

.numberBtn{
  text-align:left;
  padding-left:15px;
}

.numberBtn.selected{
  background:#00c853 ;
  color:white;
}

.wrong{
  background:#d50000 !important;
  color:white;
}

.answerGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-top:8px;
  margin-bottom:15px;
}

.result{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  color:white;
}

.ok{
  background:#00c853;
}

.ng{
  background:#d50000;
}

.explain{
  background:rgba(255,255,255,0.92);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  color:#111;
}

img{
  width:100%;
  max-width:100%;
  height:auto;
  border-radius:10px;
  margin-bottom:10px;
  border:2px solid rgba(255,255,255,0.5);
}

/* スマホ */
@media (max-width: 768px){

  .card{
    padding:8px;
  }

  img{
    width:100%;
    max-height:70vh;
    object-fit:contain;
  }

}
.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(5px);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  color:black;
}

select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  font-size:16px;
}

.wrong{
  background:#d50000 !important;
  color:white;
}
</style>
</head>

<body>

<h2>📡 海上無線 試験アプリ</h2>


<div id="quiz"></div>

<div id="result"></div>

<div id="explain"></div>

<script>

let data = [];
let allData = [];

let current = 0;

let answers = [];

let score = 0;
let maxScore = 0;
let reviewResults = [];

let answered = false;

let mode = "";

let selectedYear = "";
let selectedTerm = "";
let selectedSubject = "";

// ===== CSV =====

function parseCSV(text){

  const rows = [];

  let row = [];

  let cell = "";

  let inQuotes = false;

  for(let i=0;i<text.length;i++){

    const c = text[i];

    if(c === '"'){

      inQuotes = !inQuotes;

    }

    else if(c === ',' && !inQuotes){

      row.push(cell);

      cell = "";

    }

    else if(
      (c === '\n' || c === '\r')
      && !inQuotes
    ){

      if(cell !== "" || row.length){

        row.push(cell);

        rows.push(row);

      }

      row = [];

      cell = "";

    }

    else{

      cell += c;

    }

  }

  return rows;

}

// ===== CSV自動読み込み =====

window.onload = function(){

  fetch("questions.csv")

    .then(res => res.text())

    .then(text => {

      let rows = parseCSV(text);

      data = [];

      rows.slice(1).forEach(r=>{

        if(!r[4]) return;

        data.push({

          type:r[0].trim(),
          year:r[1].trim(),
          term:r[2].trim(),
          subject:r[3].trim(),
          img:r[4].trim(),

          choices:r[5]
            .split("｜")
            .map(c=>c.trim()),

          correct:r[6].trim(),
          explain:r[7] || "",

id:
  r[1].trim() + "_" +
  r[2].trim() + "_" +
  r[3].trim() + "_" +
  rows.indexOf(r)

        });

      });

      allData = [...data];

      showModeMenu();

    })

    .catch(err => {

      alert(
        "questions.csv が見つかりません"
      );

      console.error(err);

    });

}
// ===== モード =====

function showModeMenu(){

  document.getElementById("quiz").innerHTML = `

    <div class="card">

      <h3>モード選択</h3>

      <button onclick="setMode('exam')">
        試験モード
      </button>

      <button onclick="setMode('practice')">
        練習モード
      </button>

      <button onclick="loadWeakQuestions()">
        苦手克服モード
      </button>

      <button onclick="showWeakList()">
        苦手一覧
      </button>

      <button onclick="showRecords()">
        成績表示
      </button>

    </div>

  `;

}

// ←ここに追加！！
function setMode(m){

  mode = m;

  showSettingScreen();

}

// ===== 設定 =====
function showSettingScreen(){
  let html = `

    <div class="card">

      <div class="card">

  <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
  ">

    <h3 style="margin:0;">
      設定
    </h3>

    <button
      onclick="showModeMenu()"
      style="
        width:auto;
        margin:0;
        padding:10px 18px;
        background:#4b73c2;
      "
    >
      メニューへ戻る
    </button>

  </div>

<select id="yearSelect">>

<select id="yearSelect">
  ${
    [...new Set(allData.map(q => q.year))]
      .sort((a,b)=>b-a)
      .map(y => `
        <option value="${y}">
          ${y}
        </option>
      `)
      .join("")
  }
</select>     
 <select id="termSelect">

        <option value="前期">
          前期
        </option>

        <option value="後期">
          後期
        </option>

      </select>

  `;

  if(mode === "practice"){

    html += `

      <select id="subjectSelect">

        <option value="無線工学">
          無線工学
        </option>

        <option value="法規">
          法規
        </option>

      </select>

    `;

  }

  html += `

<div style="
  display:flex;
  gap:10px;
  margin-top:10px;
">

  <button
    class="mainBtn"
    onclick="startMode()"
    style="flex:1;"
  >
    開始
  </button>


</div>

`;

  document.getElementById("quiz").innerHTML = html;

}

// ===== 開始 =====

function startMode(){

  selectedYear =
    document.getElementById("yearSelect").value;

  selectedTerm =
    document.getElementById("termSelect").value;

  if(mode === "practice"){

    selectedSubject =
      document.getElementById("subjectSelect").value;

  }

  filterQuestions();

  start();

}

function filterQuestions(){

  let filtered = allData.filter(q=>{

    let ok = true;

    ok =
      ok &&
      q.year === selectedYear;

    ok =
      ok &&
      q.term === selectedTerm;

    if(mode === "practice"){

      ok =
        ok &&
        q.subject === selectedSubject;

    }

    return ok;

  });

  data = filtered;

}

function start(){

  current = 0;

  score = 0;

  maxScore = 0;

  answers = [];

  reviewResults = []; // ←追加

  answered = false;

  show();

}

// ===== 表示 =====

function show(){

  answered = false;

  let q = data[current];

  document.getElementById("result").innerHTML = "";

  document.getElementById("explain").innerHTML = "";

  let html = `

    <div class="topbar">

      <div>

        ${q.subject}
${q.year}
${q.term}

${q.type === "normal" ? "A" : "B"}-${current+1}

（${current+1}/${data.length}）

      </div>

      <button
        style="width:120px;"
        onclick="prev()"
      >
        ← 戻る
      </button>

    </div>

    <div class="card">

  `;

  if(q.img){

    html += `<img src="${q.img}">`;

  }

  // ===== A =====

  if(q.type === "normal"){

    q.choices.forEach((c,i)=>{

      html += `

        <button
          class="choiceBtn"
          onclick="selectNormal(${i})"
        >

          ${c}

        </button>

      `;

    });

  }

  // ===== B =====

  else{

    let labels =
      ["ア","イ","ウ","エ","オ"];

    if(!answers[current]){

      answers[current] = [];

    }

    labels.forEach((label,idx)=>{

      html += `

        <div class="card">

          <h3>${label}</h3>

          <div id="selected${idx}">
            未選択
          </div>

          <div class="answerGrid">

      `;

      if(q.type === "binary"){

        for(let n=1;n<=2;n++){

          let text =
            n===1
            ? "1 正しい"
            : "2 間違い";

          html += `

            <button

              class="numberBtn"

              id="multi_${idx}_${n}"

              onclick="setMultiButton(
                ${idx},
                ${n},
                '${text}'
              )"

            >

              ${text}

            </button>

          `;

        }

      }

      else{

        q.choices.forEach((c,i)=>{

          let n = i+1;

          html += `

            <button

              class="numberBtn"

              id="multi_${idx}_${n}"

              onclick="setMultiButton(
                ${idx},
                ${n},
                '${c}'
              )"

            >

              ${n}

            </button>

          `;

        });

      }

      html += `

          </div>

        </div>

      `;

    });

  }

  html += `

      <button
        class="mainBtn"
        onclick="next()"
      >
        次へ
      </button>

    </div>

  `;

  document.getElementById("quiz").innerHTML = html;

}

// ===== A選択 =====

function selectNormal(i){

  answers[current] = [i];

  document
  .querySelectorAll(".choiceBtn")
  .forEach((b,idx)=>{

    b.classList.toggle(
      "selected",
      idx===i
    );

  });

}

// ===== B選択 =====

function setMultiButton(
  idx,
  val,
  text
){

  if(!answers[current]){

    answers[current] = [];

  }

  answers[current][idx] = Number(val);

  document
  .querySelectorAll(
    `[id^="multi_${idx}_"]`
  )
  .forEach(btn=>{

    btn.classList.remove("selected");

  });

  document
  .getElementById(
    `multi_${idx}_${val}`
  )
  .classList.add("selected");

  document
  .getElementById(
    `selected${idx}`
  )
  .innerHTML = `
    選択：
    <b>${text}</b>
  `;

}

// ===== 次へ =====

function next(){

  let q = data[current];

  // ===== 採点 =====
  if(!answered){

    let user = answers[current];

    if(!user || user.length === 0){

      alert("選択してください");
      return;

    }

    let correct = q.correct
      .replace(/\s/g,"")
      .split("-")
      .map(x => Number(x));

    let point = 0;
    let full = 0;

    // ===== A問題 =====
    if(q.type === "normal"){

      full = 5;

      if(user[0] + 1 === correct[0]){

        point = 5;

      }

    }

    // ===== B問題 =====
    else{

      full = correct.length;

      correct.forEach((c,i)=>{

        if(user[i] === c){

          point++;

        }

      });

    }

    score += point;
    maxScore += full;

    reviewResults.push({

  name:
    q.subject +
    " " +
    (q.type === "normal" ? "A" : "B") +
    "-" +
    (current + 1),

  ok: point === full

});
let ok = point === full;
// 間違えたら苦手登録
if(point !== full){

  saveWrongQuestion(q);

}
// 正解したら苦手解除
else{

  let wrongs = JSON.parse(
    localStorage.getItem("wrongs")
    || "[]"
  );

  let target = wrongs.find(
    w => w.id === q.id
  );

  if(target){

    target.active = false;

    localStorage.setItem(
      "wrongs",
      JSON.stringify(wrongs)
    );

  }

}

    // ===== 正解・不正解表示 =====
if(q.type === "normal"){

  // 正解を緑
  document
    .querySelectorAll(".choiceBtn")
    [correct[0]-1]
    ?.classList.add("selected");

  // 間違え選択を赤
  if(user[0] + 1 !== correct[0]){

    document
      .querySelectorAll(".choiceBtn")
      [user[0]]
      ?.classList.add("wrong");

  }

}
else{

  correct.forEach((c,i)=>{

    let correctBtn =
      document.getElementById(
        `multi_${i}_${c}`
      );

    // 正解
    if(correctBtn){

      correctBtn.classList.add(
        "selected"
      );

    }

    // 間違え
    if(user[i] &&
       user[i] !== c){

      let wrongBtn =
        document.getElementById(
          `multi_${i}_${user[i]}`
        );

      if(wrongBtn){

        wrongBtn.classList.add(
          "wrong"
        );

      }

    }

  });

}

    document.getElementById("result").innerHTML =
      ok
      ? `<div class="result ok">
          ⭕ ${point}/${full}点
        </div>`
      : `<div class="result ng">
          ❌ ${point}/${full}点
        </div>`;

    document.getElementById("explain").innerHTML =
      `<div class="explain">
        ${q.explain}
      </div>`;

    answered = true;
    return;
  }

  // ===== 次の問題 =====
  current++;

  // ===== 終了 =====
  if(current >= data.length){

    saveResult();

    document.getElementById("result").innerHTML = "";
    document.getElementById("explain").innerHTML = "";

    let wrongList = "";

    reviewResults.forEach(r=>{

      wrongList += `
        <div style="
          padding:8px;
          margin:5px 0;
          border-radius:8px;
          background:
            ${r.ok ? "#00c853" : "#d50000"};
          color:white;
        ">
          ${r.name}
          :
          ${r.ok ? "⭕" : "❌"}
        </div>
      `;

    });

    document.getElementById("quiz").innerHTML = `

      <div class="card">

        <h2>終了！</h2>

        <h2>
          ${score}
          /
          ${maxScore}
          点
        </h2>

        <h3>復習一覧</h3>

        ${wrongList}

        <button onclick="showModeMenu()">
          メニューへ
        </button>

      </div>

    `;

    return;

  }

  show();

}

// ===== 苦手保存 =====
function saveWrongQuestion(q){

  let wrongs = JSON.parse(
    localStorage.getItem("wrongs")
    || "[]"
  );

  let existing = wrongs.find(
    w => w.id === q.id
  );

  // 既にある問題
  if(existing){

    existing.missCount =
      (existing.missCount || 0)
      + 1;

    existing.active = true;
  }

  // 新規追加
  else{

    wrongs.push({

      ...q,

      missCount:1,
      active:true

    });

  }

  localStorage.setItem(
    "wrongs",
    JSON.stringify(wrongs)
  );
}
// ===== 戻る =====

function prev(){

  // 最初の問題なら設定画面へ戻る
  if(current <= 0){

    if(mode){
      showSettingScreen();
    }else{
      showModeMenu();
    }

    return;
  }

  current--;

  answered = false;

  document.getElementById("result").innerHTML = "";
  document.getElementById("explain").innerHTML = "";

  show();

}



// ===== 苦手 =====

function loadWeakQuestions(){

  let wrongs = JSON.parse(

    localStorage.getItem(
      "wrongs"
    ) || "[]"

  );

  data = wrongs.filter(

    w => w.active === true

  );

  start();

}


function showWeakList(){

  let wrongs = JSON.parse(

    localStorage.getItem(
      "wrongs"
    ) || "[]"

  );

  let html = `

    <div class="card">

      <h2>苦手一覧</h2>

  `;

  wrongs
    .sort((a,b)=>

      b.missCount -
      a.missCount

    )
    .forEach(w=>{

      html += `

        <div style="
          padding:10px;
          margin:5px 0;
          border-radius:8px;
          background:
            ${
              w.active
              ? "#d50000"
              : "#00c853"
            };
          color:white;
        ">

          ${w.year}
          ${w.term}

          ${w.subject}

          ${w.type === "normal" ? "A" : "B"}-${Number(w.id.split("_")[3])}



<br>

間違い回数：
${w.missCount}回

        </div>

      `;

    });

  html += `

      <button
        onclick="showModeMenu()"
      >
        戻る
      </button>

    </div>

  `;

  document
    .getElementById("quiz")
    .innerHTML = html;

}

// ===== 成績保存 =====

function saveResult(){

  let results = JSON.parse(

    localStorage.getItem("results") || "[]"

  );

  results.push({

    year:selectedYear,

    term:selectedTerm,

    subject:selectedSubject,

    score:score,

    max:maxScore,

    date:new Date().toLocaleString()

  });

  localStorage.setItem(

    "results",

    JSON.stringify(results)

  );

}

// ===== 成績 =====

function showRecords(){

  let results = JSON.parse(

    localStorage.getItem("results") || "[]"

  );

  let html = `

    <div class="card">

      <h2>成績一覧</h2>

  `;

  results.forEach(r=>{

    html += `

      <div style="margin-bottom:10px;">

        ${r.year}
        ${r.term}
        ${r.subject}

        :

        ${r.score}
        /
        ${r.max}

      </div>

    `;

  });

  html += `

      <button onclick="showModeMenu()">

        戻る

      </button>

    </div>

  `;

  document.getElementById("quiz").innerHTML = html;

}

</script>

</body>
</html>
